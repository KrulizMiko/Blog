version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///blog.db
      - JWT_SECRET_KEY=docker-secret-key-change-in-production
    volumes:
      - ./logs:/app/logs
      - ./instance:/app/instance
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 run:app
    restart: unless-stopped

